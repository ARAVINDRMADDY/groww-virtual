<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Virtual Interior</title>
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            terracotta: '#BC6C25',
            olive: '#606C38',
            'dark-brown': '#283618',
            cream: '#F6F1E9',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>

  <style>
    [dir="rtl"] { direction: rtl; }
  </style>
</head>
<body class="font-sans antialiased transition-colors duration-300 bg-cream/30 dark:bg-[#1f2912] h-screen w-screen flex items-center justify-center p-4 overflow-hidden relative">

  <div class="absolute top-4 right-4 flex space-x-2 z-50">
    <button id="rtl-toggle" class="w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-md hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center text-gray-800 dark:text-white transition duration-300 text-xs font-bold" title="Toggle RTL">
      RTL
    </button>
    <button id="theme-toggle" class="w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-md hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center text-gray-800 dark:text-white transition duration-300" title="Toggle Theme">
      <i class="fas fa-moon dark:hidden"></i>
      <i class="fas fa-sun hidden dark:inline"></i>
    </button>
  </div>

  <div class="max-w-md w-full bg-white dark:bg-dark-brown rounded-2xl shadow-2xl p-6 sm:p-8 space-y-6 border border-gray-100 dark:border-olive/20 relative z-10">
    
    <div class="text-center space-y-1.5">
      <a href="index.html" class="inline-block text-2xl font-bold text-dark-brown dark:text-white transition-colors duration-300">
        Virtual <span class="text-terracotta">Interior</span>
      </a>
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mt-2">Welcome Back</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Please sign in to your account</p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button class="w-full flex items-center justify-center px-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl shadow-sm bg-white dark:bg-gray-800 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-300">
        <i class="fab fa-google text-red-500 mx-2 text-lg"></i>
        Google
      </button>

      <button class="w-full flex items-center justify-center px-4 py-2.5 rounded-xl shadow-sm bg-black text-white dark:bg-white dark:text-black text-sm font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition duration-300">
        <i class="fab fa-apple mx-2 text-xl mb-0.5"></i>
        Apple
      </button>
    </div>

    <div class="relative flex items-center">
      <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
      <span class="flex-shrink-0 px-3 text-gray-500 dark:text-gray-400 text-sm">Or continue with email</span>
      <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
    </div>

    <form class="space-y-4" action="#" method="POST">
      <div class="space-y-1.5 relative">
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 start-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400 text-sm"></i>
          </div>
          <input id="email" name="email" type="email" autocomplete="email" required class="block w-full px-10 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base focus:ring-terracotta focus:border-terracotta bg-gray-50 dark:bg-gray-800 dark:text-white transition duration-300" placeholder="you@example.com">
        </div>
      </div>

      <div class="space-y-1.5 relative">
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
          <a href="#" class="text-xs font-medium text-terracotta hover:text-olive transition-colors">Forgot password?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 start-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400 text-sm"></i>
          </div>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full px-10 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base focus:ring-terracotta focus:border-terracotta bg-gray-50 dark:bg-gray-800 dark:text-white transition duration-300" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="w-full flex justify-center py-3 px-4 mt-2 border border-transparent rounded-xl shadow-md text-base font-bold text-white bg-terracotta hover:bg-olive transition duration-300 transform hover:-translate-y-0.5">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 dark:text-gray-400 m-0">
      Don't have an account? 
      <a href="register.html" class="font-bold text-terracotta hover:text-olive transition-colors">Register here</a>
    </p>
  </div>

  <script>
    const html = document.documentElement;

    // Theme Toggle Logic
    const themeToggle = document.getElementById('theme-toggle');
    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }
    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    // RTL Toggle Logic
    const rtlToggle = document.getElementById('rtl-toggle');
    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }
    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>
</body>
</html>

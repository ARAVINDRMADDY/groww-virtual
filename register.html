<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Virtual Interior</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            terracotta: '#BC6C25',
            olive: '#606C38',
            'dark-brown': '#283618',
            cream: '#F6F1E9',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased transition-colors duration-300 bg-cream/30 dark:bg-[#1f2912] h-screen w-screen flex items-center justify-center p-4 overflow-hidden">

  <div class="max-w-md w-full bg-white dark:bg-dark-brown rounded-2xl shadow-2xl p-6 sm:p-8 space-y-5 border border-gray-100 dark:border-olive/20">
    
    <div class="text-center space-y-1">
      <a href="index.html" class="inline-block text-2xl font-bold text-dark-brown dark:text-white transition-colors duration-300">
        Virtual <span class="text-terracotta">Interior</span>
      </a>
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mt-1">Create an Account</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Join us to start designing</p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button class="w-full flex items-center justify-center px-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl shadow-sm bg-white dark:bg-gray-800 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-300">
        <i class="fab fa-google text-red-500 mr-2 text-lg"></i>
        Google
      </button>

      <button class="w-full flex items-center justify-center px-4 py-2.5 rounded-xl shadow-sm bg-black text-white dark:bg-white dark:text-black text-sm font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition duration-300">
        <i class="fab fa-apple mr-2 text-xl mb-0.5"></i>
        Apple
      </button>
    </div>

    <div class="relative flex items-center">
      <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
      <span class="flex-shrink-0 px-3 text-gray-500 dark:text-gray-400 text-sm">Or register with email</span>
      <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
    </div>

    <form class="space-y-4" action="#" method="POST">
      
      <div class="space-y-1.5">
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Full Name</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fas fa-user text-gray-400 text-sm"></i>
          </div>
          <input id="name" name="name" type="text" required class="block w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base focus:ring-terracotta focus:border-terracotta bg-gray-50 dark:bg-gray-800 dark:text-white transition duration-300" placeholder="John Doe">
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400 text-sm"></i>
          </div>
          <input id="email" name="email" type="email" autocomplete="email" required class="block w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base focus:ring-terracotta focus:border-terracotta bg-gray-50 dark:bg-gray-800 dark:text-white transition duration-300" placeholder="you@example.com">
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400 text-sm"></i>
          </div>
          <input id="password" name="password" type="password" autocomplete="new-password" required class="block w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base focus:ring-terracotta focus:border-terracotta bg-gray-50 dark:bg-gray-800 dark:text-white transition duration-300" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="w-full flex justify-center py-3 px-4 mt-2 border border-transparent rounded-xl shadow-md text-base font-bold text-white bg-terracotta hover:bg-olive transition duration-300 transform hover:-translate-y-0.5">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 dark:text-gray-400 m-0">
      Already have an account? 
      <a href="login.html" class="font-bold text-terracotta hover:text-olive transition-colors">Sign in here</a>
    </p>
  </div>

</body>
</html>
